name: Build ImmortalWrt for Cudy TR3000 v1

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4   # ✅ 升级到 v4，避免 Node.js 20 弃用警告

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib \
            gettext git libncurses5-dev libssl-dev python3-pip python3-setuptools rsync unzip zlib1g-dev \
            file wget

      - name: Setup feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Use custom config
        run: |
          cp .config .config.orig
          make defconfig

      - name: Build firmware
        run: make -j$(nproc)

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4   # ✅ 升级到 v4
        with:
          name: firmware
          path: bin/targets/mediatek/filogic/

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4   # ✅ 升级到 v4
        with:
          name: packages
          path: bin/packages/
